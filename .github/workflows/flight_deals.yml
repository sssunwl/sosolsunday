name: 航班優惠爬蟲

on:
  schedule:
    # 每天 HKT 08:00（UTC 00:00）
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout 代碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安裝依賴
        run: pip install -r requirements.txt

      - name: 執行爬蟲
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          LITEAPI_KEY: ${{ secrets.LITEAPI_KEY }}
        run: python flight_scraper.py

      - name: 提交 JSON 數據到 GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/flights.json docs/data/hotels.json
          if git diff --cached --quiet; then
            echo "數據無變化，跳過 commit"
          else
            git commit -m "data: 自動更新 $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
          fi
