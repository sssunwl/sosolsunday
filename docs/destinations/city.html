<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市指南 · SoSolsunday</title>
  <style>
    :root{
      --navy:#1B2F4A;--gold:#C9A84C;--sand:#F2EDE6;
      --white:#fff;--text:#1E2D3D;--muted:#6B7D90;
      --green:#2D9B6F;--amber:#D48B20;--red:#C03030;
      --sh:0 2px 12px rgba(0,0,0,.08);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--sand);color:var(--text);min-height:100vh}

    /* Nav */
    .hdr{background:var(--navy);padding:13px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
    .hdr-back{color:rgba(255,255,255,.6);font-size:13px;text-decoration:none}
    .hdr-back:hover{color:var(--gold)}
    .hdr-city{color:var(--gold);font-size:15px;font-weight:700;letter-spacing:.5px}
    .hdr-logo{margin-left:auto;color:rgba(255,255,255,.3);font-size:11px;text-decoration:none}
    .hdr-logo:hover{color:var(--gold)}

    /* Hero */
    .hero{background:linear-gradient(160deg,#1B2F4A 0%,#1E3A5F 55%,#243352 100%);padding:32px 20px 26px;text-align:center}
    .hero-flag{font-size:36px;margin-bottom:8px}
    .hero h1{color:var(--gold);font-size:24px;font-weight:300;letter-spacing:2px;margin-bottom:6px}
    .hero-tagline{color:rgba(255,255,255,.55);font-size:12px;letter-spacing:1px;margin-bottom:14px}
    .best-months{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
    .month-chip{padding:4px 10px;border-radius:12px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:var(--gold);font-size:11px}

    /* Quick info */
    .qinfo{background:var(--navy);padding:12px 20px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
    .qinfo::-webkit-scrollbar{display:none}
    .qi{flex-shrink:0;padding:0 16px;border-right:1px solid rgba(255,255,255,.1);text-align:center}
    .qi:first-child{padding-left:0}
    .qi:last-child{border-right:none}
    .qi-label{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
    .qi-val{font-size:12px;color:rgba(255,255,255,.8);white-space:nowrap}

    /* Sections */
    .sec{padding:18px 16px 6px}
    .sec-ttl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:12px}

    /* Live flights */
    .flight-row{background:var(--white);border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:center;justify-content:space-between}
    .flight-route{font-size:13px;font-weight:600;color:var(--navy)}
    .flight-meta{font-size:10px;color:var(--muted);margin-top:2px}
    .flight-price{font-size:18px;font-weight:700;color:var(--green)}
    .flight-month{font-size:10px;color:var(--muted);text-align:right}

    /* Live hotels */
    .hotel-row{background:var(--white);border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:center;justify-content:space-between}
    .hotel-name{font-size:13px;font-weight:600;color:var(--navy);line-height:1.3}
    .hotel-sub{font-size:10px;color:var(--muted);margin-top:2px}
    .hotel-price{font-size:17px;font-weight:700;color:var(--green);text-align:right}
    .hotel-nights{font-size:10px;color:var(--muted)}

    /* Highlights */
    .hl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
    .hl-card{background:var(--white);border-radius:10px;padding:13px 12px;box-shadow:var(--sh)}
    .hl-tag{display:inline-block;padding:2px 8px;border-radius:8px;background:#EEF2F7;color:var(--navy);font-size:9px;font-weight:700;margin-bottom:6px}
    .hl-name{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:4px}
    .hl-desc{font-size:11px;color:var(--muted);line-height:1.4}

    /* Articles */
    .art-card{background:var(--white);border-radius:12px;padding:14px 16px;margin-bottom:9px;box-shadow:var(--sh)}
    .art-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
    .art-tag{padding:2px 8px;border-radius:8px;background:#EEF2F7;color:var(--navy);font-size:9px;font-weight:700}
    .art-title{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:5px;line-height:1.4}
    .art-summary{font-size:12px;color:var(--muted);line-height:1.5}
    .art-date{font-size:10px;color:var(--muted);margin-top:7px}

    /* States */
    .nodata{text-align:center;padding:20px;color:var(--muted);font-size:12px}
    .loading{text-align:center;padding:28px;color:var(--muted);font-size:12px}

    footer{background:var(--navy);padding:16px 20px;text-align:center;color:rgba(255,255,255,.3);font-size:10.5px;margin-top:8px}
    footer a{color:var(--gold);text-decoration:none}
  </style>
</head>
<body>

<header class="hdr">
  <a class="hdr-back" href="./">← 目的地</a>
  <span class="hdr-city" id="hdr-city">載入中…</span>
  <a class="hdr-logo" href="../">☀ SoSolsunday</a>
</header>

<div id="hero-section">
  <div class="hero">
    <div class="hero-flag" id="hero-flag">🌍</div>
    <h1 id="hero-name">—</h1>
    <div class="hero-tagline" id="hero-tagline">—</div>
    <div class="best-months" id="best-months"></div>
  </div>
  <div class="qinfo" id="qinfo"></div>
</div>

<div class="sec">
  <div class="sec-ttl">即時機票最低價</div>
  <div id="live-flights"><div class="loading">載入中…</div></div>
</div>

<div class="sec">
  <div class="sec-ttl">本週末酒店報價（4星+）</div>
  <div id="live-hotels"><div class="loading">載入中…</div></div>
</div>

<div class="sec">
  <div class="sec-ttl">必去亮點</div>
  <div class="hl-grid" id="highlights"></div>
</div>

<div class="sec">
  <div class="sec-ttl">旅遊攻略</div>
  <div id="articles"><div class="loading">載入中…</div></div>
</div>

<footer>
  <a href="../">☀ SoSolsunday</a> · 旅遊優惠速報 &amp; 目的地指南
</footer>

<script>
const params = new URLSearchParams(location.search);
const CITY_KEY = params.get('key') || '';

async function boot() {
  if (!CITY_KEY) { document.getElementById('hdr-city').textContent = '找不到城市'; return; }
  const ts = '?v=' + Date.now();
  const [cr, fr, hr] = await Promise.all([
    fetch('./data/' + CITY_KEY + '.json' + ts).catch(() => null),
    fetch('../data/flights.json' + ts).catch(() => null),
    fetch('../data/hotels.json'  + ts).catch(() => null),
  ]);
  const CD = cr?.ok ? await cr.json() : null;
  const FD = fr?.ok ? await fr.json() : null;
  const HD = hr?.ok ? await hr.json() : null;

  if (!CD) { document.getElementById('hdr-city').textContent = '城市資料不存在'; return; }

  document.title = CD.city + ' · SoSolsunday';
  renderHero(CD);
  renderFlights(CD, FD);
  renderHotels(CD, HD);
  renderHighlights(CD);
  renderArticles(CD);
}

function renderHero(CD) {
  document.getElementById('hdr-city').textContent = CD.flag + ' ' + CD.city;
  document.getElementById('hero-flag').textContent = CD.flag;
  document.getElementById('hero-name').textContent = CD.city;
  document.getElementById('hero-tagline').textContent = CD.tagline || '';

  const bm = document.getElementById('best-months');
  (CD.best_months || []).forEach(m => {
    const c = document.createElement('span');
    c.className = 'month-chip';
    c.textContent = m;
    bm.appendChild(c);
  });

  const qi = document.getElementById('qinfo');
  const items = [
    ['簽證', (CD.visa?.HK || CD.visa || '—')],
    ['貨幣', CD.currency || '—'],
    ['時區', CD.timezone || '—'],
    ['機場', CD.airport || '—'],
  ];
  qi.innerHTML = items.map(([l, v]) =>
    `<div class="qi"><div class="qi-label">${l}</div><div class="qi-val">${v}</div></div>`
  ).join('');
}

function renderFlights(CD, FD) {
  const el = document.getElementById('live-flights');
  if (!FD) { el.innerHTML = '<div class="nodata">暫無機票數據</div>'; return; }

  const codes = CD.airport_codes || [];
  const routes = (FD.routes || []).filter(r => codes.includes(r.dest));

  // Also check cheapest destinations list
  const destRows = [];
  for (const [originCode, originName] of [['HKG','香港'],['TPE','台北']]) {
    const found = (FD.destinations?.[originCode] || []).find(d => d.name === CD.flight_city_name);
    if (found) destRows.push({ origin: originName, price: found.price, month: '本月' });
  }

  if (!routes.length && !destRows.length) {
    el.innerHTML = '<div class="nodata">暫無機票數據</div>'; return;
  }

  let html = '';

  // Routes (6-month data)
  for (const r of routes) {
    const best = r.months.reduce((a, b) => a.price < b.price ? a : b, r.months[0]);
    if (!best) continue;
    html += `<div class="flight-row">
      <div>
        <div class="flight-route">${r.flag} ${r.origin_name} → ${r.dest_name}</div>
        <div class="flight-meta">${best.airline} · 最低出發月</div>
      </div>
      <div style="text-align:right">
        <div class="flight-price">HK$${best.price.toLocaleString()}</div>
        <div class="flight-month">${best.month.slice(5)}月出發</div>
      </div>
    </div>`;
  }

  // Destination cheapest (no route data)
  if (!routes.length) {
    for (const d of destRows) {
      html += `<div class="flight-row">
        <div>
          <div class="flight-route">🛫 從${d.origin}出發</div>
          <div class="flight-meta">本月最低價</div>
        </div>
        <div style="text-align:right">
          <div class="flight-price">HK$${d.price.toLocaleString()}</div>
          <div class="flight-month">本月</div>
        </div>
      </div>`;
    }
  }

  el.innerHTML = html || '<div class="nodata">暫無機票數據</div>';
}

function renderHotels(CD, HD) {
  const el = document.getElementById('live-hotels');
  if (!HD || !CD.hotel_city_key) { el.innerHTML = '<div class="nodata">暫無酒店數據</div>'; return; }

  const city = (HD.cities || []).find(c => c.key === CD.hotel_city_key);
  const hotels = city?.weekend_hotels?.[0] || [];
  const wknd = HD.weekends?.[0];

  if (!hotels.length) { el.innerHTML = '<div class="nodata">本週末暫無報價</div>'; return; }

  const dateStr = wknd ? wknd.label : '';
  el.innerHTML = hotels.map(h => `
    <div class="hotel-row">
      <div>
        <div class="hotel-name">${h.name}</div>
        <div class="hotel-sub">⭐${h.rating} · ${'★'.repeat(h.stars||4)} · ${dateStr} · 2晚2人</div>
      </div>
      <div>
        <div class="hotel-price">HK$${h.price.toLocaleString()}</div>
        <div class="hotel-nights">2晚</div>
      </div>
    </div>`).join('');
}

function renderHighlights(CD) {
  const el = document.getElementById('highlights');
  const hl = CD.highlights || [];
  el.innerHTML = hl.length
    ? hl.map(h => `
        <div class="hl-card">
          <span class="hl-tag">${h.tag}</span>
          <div class="hl-name">${h.name}</div>
          <div class="hl-desc">${h.desc}</div>
        </div>`).join('')
    : '<div class="nodata" style="grid-column:1/-1">攻略內容即將加入</div>';
}

function renderArticles(CD) {
  const el = document.getElementById('articles');
  const arts = CD.articles || [];
  el.innerHTML = arts.length
    ? arts.map(a => `
        <div class="art-card">
          <div class="art-tags">${(a.tags||[]).map(t=>`<span class="art-tag">${t}</span>`).join('')}</div>
          <div class="art-title">${a.title}</div>
          <div class="art-summary">${a.summary}</div>
          <div class="art-date">${a.date || ''}</div>
        </div>`).join('')
    : '<div class="nodata">攻略文章即將加入</div>';
}

boot();
</script>
</body>
</html>
